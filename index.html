}
function PieChart({ data, size=180 }) {
  if(!data||data.length===0||data.reduce((s,d)=>s+d.value,0)===0) return <div style={{color:"#3a7a9c",textAlign:"center",padding:20,fontSize:12}}>No data yet</div>;
  const total=data.reduce((s,d)=>s+d.value,0);
  let angle=-Math.PI/2;
  const cx=size/2,cy=size/2,r=size/2-10;
  const slices=data.map(d=>{
    const start=angle,sweep=(d.value/total)*2*Math.PI;
    angle+=sweep;
    const x1=cx+r*Math.cos(start),y1=cy+r*Math.sin(start);
    const x2=cx+r*Math.cos(start+sweep),y2=cy+r*Math.sin(start+sweep);
    return{...d,path:`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${sweep>Math.PI?1:0},1 ${x2},${y2} Z`,pct:((d.value/total)*100).toFixed(1)};
  });
  return (
    <div>
      <svg width={size} height={size} style={{display:"block",margin:"0 auto"}}>
        {slices.map((s,i)=><path key={i} d={s.path} fill={s.color} stroke="#070e14" strokeWidth="2"/>)}
      </svg>
      <div style={{display:"flex",flexWrap:"wrap",gap:"8px 16px",marginTop:12,justifyContent:"center"}}>
        {slices.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:6,fontSize:11}}>
            <div style={{width:10,height:10,borderRadius:2,background:s.color}}/>
            <span style={{color:"#e0f0ff"}}>{s.label}</span>
            <span style={{color:"#3a7a9c"}}>{s.pct}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}
function LineChart({ data, color="#7de8c8", height=120 }) {
  if(!data||data.length<2) return <div style={{color:"#3a7a9c",textAlign:"center",padding:20,fontSize:12}}>Need more sell transactions for graph</div>;
  const vals=data.map(d=>d.value),min=Math.min(...vals),max=Math.max(...vals),range=max-min||1;
  const w=320,h=height,pad=28;
  const pts=data.map((d,i)=>{
    const x=pad+(i/(data.length-1))*(w-pad*2);
    const y=h-pad-((d.value-min)/range)*(h-pad*2);
    return`${x},${y}`;
  });
  const areaPath=`M${pts[0]} L${pts.join(" L")} L${pad+(w-pad*2)},${h-pad} L${pad},${h-pad} Z`;
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{overflow:"visible"}}>
      <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.3"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <path d={areaPath} fill="url(#lg)"/>
      <polyline points={pts.join(" ")} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"/>
      {data.map((d,i)=>{const[x,y]=pts[i].split(",");return<circle key={i} cx={x} cy={y} r="3" fill={color}/>;})}
      <text x={pad} y={h-6} fill="#3a7a9c" fontSize="9">{data[0]?.label}</text>
      <text x={w-pad} y={h-6} fill="#3a7a9c" fontSize="9" textAnchor="end">{data[data.length-1]?.label}</text>
      <text x={pad-2} y={pad} fill="#3a7a9c" fontSize="9" textAnchor="end">₹{fmt(max)}</text>
      <text x={pad-2} y={h-pad} fill="#3a7a9c" fontSize="9" textAnchor="end">₹{fmt(min)}</text>
    </svg>
  );
}

          </>
        )}
      </div>

        {usdtEffect!==0&&<span style={{fontSize:10,color:usdtEffect>0?"#5bc4f5":"#e05070",background:usdtEffect>0?"#0a1a2a":"#2a0a10",padding:"2px 8px",borderRadius:4}}>{usdtEffect>0?"+":""}{fmt(usdtEffect)} ₮</span>}

}
  function App() {
  const [loggedIn, setLoggedIn] = useState(()=>sessionStorage.getItem("auth")==="1");
  const [tab, setTab] = useState("Transactions");
  const [transactions, setTransactions] = useState([]);
  const [loading, setLoading] = useState(true);
  const [txFormOpen, setTxFormOpen] = useState(false);
  const [editTx, setEditTx] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [reportFrom, setReportFrom] = useState("");
  const [reportTo, setReportTo] = useState("");

  const handleLogin = () => { sessionStorage.setItem("auth","1"); setLoggedIn(true); };
  const handleLogout = () => { sessionStorage.removeItem("auth"); setLoggedIn(false); };

  useEffect(()=>{
    if(!loggedIn) return;
    const fetch = async () => {
      const { data, error } = await sb.from("transactions").select("*").order("date",{ascending:true}).order("time",{ascending:true});
      if(error) console.error(error);
      else setTransactions(data||[]);
      setLoading(false);
    };
    fetch();
    const sub = sb.channel("transactions").on("postgres_changes",{event:"*",schema:"public",table:"transactions"},fetch).subscribe();
    return () => sb.removeChannel(sub);
  },[loggedIn]);

  // Sort by date+time then by type order (capital→buy→sell)
  const typeOrder = { capital:0, loan_back:1, buy:2, adjust:3, sell:4, loan_given:5 };
  const sorted = [...transactions].sort((a,b)=>{
    const da=`${a.date} ${a.time}`, db=`${b.date} ${b.time}`;
    if(da!==db) return da.localeCompare(db);
    return (typeOrder[a.type]||0)-(typeOrder[b.type]||0);
  });

  const portfolio = useMemo(()=>{
    let cash=0,usdt=0;
    sorted.forEach(tx=>{
      if(tx.type==="buy"){cash-=tx.cash||0;usdt+=tx.qty||0;}
      else if(tx.type==="sell"){cash+=tx.cash||0;usdt-=tx.qty||0;}
      else if(tx.type==="capital"){if(tx.asset_type==="cash")cash+=tx.amount||0;else usdt+=tx.amount||0;}
      else if(tx.type==="loan_given"){if(tx.asset_type==="cash")cash-=tx.amount||0;else usdt-=tx.amount||0;}
      else if(tx.type==="loan_back"){if(tx.asset_type==="cash")cash+=tx.amount||0;else usdt+=tx.amount||0;}
      else if(tx.type==="adjust"){if(tx.asset_type==="cash")cash+=tx.amount||0;else usdt+=tx.amount||0;}
    });
    return{cash,usdt};
  },[sorted]);

  const avgCost = useMemo(()=>{
    let totalCash=0,totalUsdt=0;
    sorted.forEach(tx=>{
      if(tx.type==="buy"){totalCash+=tx.cash||0;totalUsdt+=tx.qty||0;}
      else if(tx.type==="sell"){
        const avg=totalUsdt>0?totalCash/totalUsdt:0;
        totalCash-=avg*(tx.qty||0);
        totalUsdt-=tx.qty||0;
      }
    });
    return totalUsdt>0?totalCash/totalUsdt:0;
  },[sorted]);

  const profits = useMemo(()=>{
    const now=Date.now(),DAY=86400000;
    let today=0,weekly=0,monthly=0,allTime=0;
    let totalCash=0,totalUsdt=0;
    sorted.forEach(tx=>{
      if(tx.type==="buy"){totalCash+=tx.cash||0;totalUsdt+=tx.qty||0;}
      else if(tx.type==="sell"){
        const avg=totalUsdt>0?totalCash/totalUsdt:0;
        const p=(tx.price-avg)*(tx.qty||0);
        const age=now-new Date(tx.date).getTime();
        allTime+=p;
        if(age<=DAY)today+=p;
        if(age<=DAY*7)weekly+=p;
        if(age<=DAY*30)monthly+=p;
        totalCash-=avg*(tx.qty||0);
        totalUsdt-=tx.qty||0;
      }
    });
    return{today,weekly,monthly,allTime};
  },[sorted]);

  const profitGraphData = useMemo(()=>{
    let totalCash=0,totalUsdt=0;const byDay={};
    sorted.forEach(tx=>{
      if(tx.type==="buy"){totalCash+=tx.cash||0;totalUsdt+=tx.qty||0;}
      else if(tx.type==="sell"){
        const avg=totalUsdt>0?totalCash/totalUsdt:0;
        const p=(tx.price-avg)*(tx.qty||0);
        const key=tx.date;
        byDay[key]=(byDay[key]||0)+p;
        totalCash-=avg*(tx.qty||0);totalUsdt-=tx.qty||0;
      }
    });
    let cum=0;
    return Object.entries(byDay).sort().map(([label,val])=>{cum+=val;return{label,value:cum};});
  },[sorted]);

  const partyData = useMemo(()=>{
    const buyers={},sellers={};
    sorted.forEach(tx=>{
      if(tx.type==="sell"&&tx.party)buyers[tx.party]=(buyers[tx.party]||0)+(tx.qty||0);
      else if(tx.type==="buy"&&tx.party)sellers[tx.party]=(sellers[tx.party]||0)+(tx.qty||0);
    });
    const C=["#7de8c8","#5bc4f5","#f5c05b","#e05070","#a78bfa","#34d399","#f97316","#60a5fa"];
    return{
      buyerList:Object.entries(buyers).map(([label,value],i)=>({label,value,color:C[i%C.length]})),
      sellerList:Object.entries(sellers).map(([label,value],i)=>({label,value,color:C[i%C.length]}))
    };
  },[sorted]);

  const reportData = useMemo(()=>{
    const from=reportFrom?new Date(reportFrom):null;
    const to=reportTo?new Date(reportTo+"T23:59:59"):null;
    const filtered=sorted.filter(tx=>{
      const d=new Date(tx.date);
      return(!from||d>=from)&&(!to||d<=to);
    });
    let totalCash=0,totalUsdt=0,profit=0;
    sorted.forEach(tx=>{
      if(tx.type==="buy"){totalCash+=tx.cash||0;totalUsdt+=tx.qty||0;}
      else if(tx.type==="sell"){
        const avg=totalUsdt>0?totalCash/totalUsdt:0;
        const p=(tx.price-avg)*(tx.qty||0);
        const d=new Date(tx.date);
        if((!from||d>=from)&&(!to||d<=to))profit+=p;
        totalCash-=avg*(tx.qty||0);totalUsdt-=tx.qty||0;
      }
    });
    const byParty={};
    filtered.forEach(tx=>{
      if(!tx.party)return;
      if(!byParty[tx.party])byParty[tx.party]={name:tx.party,buyQty:0,sellQty:0,buyVal:0,sellVal:0};

      else if(tx.type==="sell"){byParty[tx.party].sellQty+=tx.qty||0;byParty[tx.party].sellVal+=tx.cash||0;}
    });
    return{profit,filtered,partyList:Object.values(byParty).sort((a,b)=>(b.buyQty+b.sellQty)-(a.buyQty+a.sellQty))};
  },[sorted,reportFrom,reportTo]);

  };

  const openEdit=(tx)=>{setEditTx(tx);setTxFormOpen(true);};

  const sortedDesc=[...sorted].reverse();

  if(!loggedIn) return <LoginScreen onLogin={handleLogin}/>;

    return (

              </div>
              <div>
                <div style={{fontSize:9,color:"#3a7a9c",letterSpacing:2,marginBottom:6}}>TO</div>
                <input type="date" value={reportTo} onChange={e=>setReportTo(e.target.value)} style={{width:"100%",background:"#07121a",border:"1px solid #1a3040",borderRadius:8,padding:"10px",color:"#e0f0ff",fontSize:12,fontFamily:"inherit",outline:"none"}}/>
              </div>
            </div>
            {(reportFrom||reportTo)&&<button onClick={()=>{setReportFrom("");setReportTo("");}} style={{marginTop:10,background:"none",border:"1px solid #1a3040",borderRadius:6,padding:"6px 12px",color:"#3a7a9c",fontSize:11,fontFamily:"inherit",cursor:"pointer"}}>✕ Clear Filter</button>}
          </Card>
          <div style={{background:"#0a1820",borderRadius:14,padding:"18px",border:`1px solid ${reportData.profit>=0?"#1a4030":"#401a28"}`,marginBottom:16}}>
            <div style={{fontSize:10,color:"#3a7a9c",letterSpacing:3,marginBottom:6}}>{reportFrom||reportTo?`PROFIT: ${reportFrom||"start"} → ${reportTo||"now"}`:"ALL TIME PROFIT"}</div>
            <div style={{fontSize:36,fontWeight:700,color:reportData.profit>=0?"#2aad72":"#e05070"}}>{reportData.profit>=0?"+":"-"}₹{fmt(Math.abs(reportData.profit))}</div>
            <div style={{fontSize:11,color:"#3a7a9c",marginTop:4}}>{reportData.filtered.length} transactions in range</div>
          </div>
          <Card style={{marginBottom:16}}>
            <Label>Party Ranking (in range)</Label>
            {reportData.partyList.length===0&&<div style={{color:"#3a7a9c",fontSize:12,padding:"12px 0"}}>No data in selected range</div>}
            {reportData.partyList.map((p,i)=>(
              <div key={p.name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:"1px solid #1a3040"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:24,height:24,borderRadius:6,background:i===0?"#f5c05b":i===1?"#7a9ab0":"#1a3040",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:i<2?"#070e14":"#3a7a9c"}}>{i+1}</div>
                  <div>
                    <div style={{fontSize:13,color:"#e0f0ff",fontWeight:600}}>{p.name}</div>
                    <div style={{fontSize:10,color:"#3a7a9c"}}>{p.buyQty>0&&`Sold ${fmt(p.buyQty)}₮`}{p.buyQty>0&&p.sellQty>0&&" · "}{p.sellQty>0&&`Bought ${fmt(p.sellQty)}₮`}</div>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  {p.buyQty>0&&<div style={{fontSize:12,color:"#f5c05b"}}>₹{fmt(p.buyVal)}</div>}
                  {p.sellQty>0&&<div style={{fontSize:12,color:"#5bc4f5"}}>₹{fmt(p.sellVal)}</div>}
                </div>
              </div>
            ))}
          </Card>
          <Label>Transactions in Range</Label>
          {reportData.filtered.length===0&&<div style={{color:"#3a7a9c",textAlign:"center",padding:20,fontSize:13}}>No transactions in selected range</div>}
          {[...reportData.filtered].reverse().map(tx=>(
            <TxCard key={tx.id} tx={tx} onEdit={openEdit} onDelete={(id)=>setDeleteConfirm(id)}/>
          ))}
        </div>
      )}

      <TxFormModal open={txFormOpen} onClose={()=>{setTxFormOpen(false);setEditTx(null);}} mode={editTx?"edit":"new"} editTx={editTx} onSave={handleSave}/>

      <Modal open={!!deleteConfirm} onClose={()=>setDeleteConfirm(null)}>
        <div style={{fontSize:18,fontWeight:700,color:"#e05070",marginBottom:12}}>Delete Transaction?</div>
        <div style={{fontSize:13,color:"#7a9ab0",marginBottom:24}}>This will permanently delete from Supabase.</div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setDeleteConfirm(null)} style={{flex:1,padding:"14px",borderRadius:10,background:"#0a1820",border:"1px solid #1a3040",color:"#7a9ab0",fontSize:13,fontFamily:"inherit",cursor:"pointer",fontWeight:600}}>CANCEL</button>
          <button onClick={()=>handleDelete(deleteConfirm)} style={{flex:2,padding:"14px",borderRadius:10,background:"linear-gradient(135deg,#3d0d1a,#6b1a2a)",border:"1px solid #ad2a4a",color:"#e05070",fontSize:13,fontWeight:700,fontFamily:"inherit",cursor:"pointer"}}>DELETE</button>
        </div>
      </Modal>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
</script>
</body>
</html>
